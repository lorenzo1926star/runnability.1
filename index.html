<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RunTrack Pro</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

</head>
<body>

<header class="app-header">
<div class="app-title">
<div class="logo">🏃</div>
<div>
<div class="title">RunTrack Pro</div>
<div class="subtitle">Allenamento Outdoor</div>
</div>
</div>
</header>

<main class="app-main">

<section id="dashboard" class="screen active">
<div class="card">
<div class="card-title">Dashboard</div>
<div class="kpi">
<div class="kpi-item">
<div class="kpi-label">Allenamenti</div>
<div class="kpi-value" id="kpiRuns">0</div>
</div>

<div class="kpi-item">
<div class="kpi-label">Km Totali</div>
<div class="kpi-value" id="kpiKm">0</div>
</div>

<div class="kpi-item">
<div class="kpi-label">Kcal</div>
<div class="kpi-value" id="kpiKcal">0</div>
</div>
</div>
</div>
</section>


<section id="map" class="screen">

<div class="card">
<div class="card-title">Allenamento</div>

<div id="mapid"></div>

<div class="workout-bar">
<button class="btn secondary" onclick="startRun()">Inizia</button>
<button class="btn danger" onclick="stopRun()">Stop</button>
</div>

<div id="stats"></div>

</div>

</section>


<section id="history" class="screen">
<div class="card">
<div class="card-title">Storico Allenamenti</div>

<div id="historyList"></div>

</div>
</section>


<section id="planner" class="screen">

<div class="card">
<div class="card-title">Planner Settimanale</div>

<div id="plannerUI"></div>

</div>

</section>


<section id="weatherpro" class="screen">

<div class="card">

<div class="card-title">Meteo Pro</div>

<div class="row">

<button class="btn secondary" id="btnGeo">
Usa la mia posizione
</button>

<input id="city" type="text" placeholder="Cerca città (es. Roma)">

<button class="btn secondary" id="btnCity">
Cerca
</button>

</div>

<!-- =====================================================
AGGIUNGERE IN index.html NELLA SEZIONE METEO
TAB RUN PLAN
===================================================== -->

<div class="card">

<h3>Run Plan</h3>

<input type="date" id="planDate">

<input type="time" id="planTime">

<button onclick="addRunPlan(planDate.value,planTime.value)">
Aggiungi allenamento
</button>

<table>

<thead>
<tr>
<th>Data</th>
<th>Ora</th>
</tr>
</thead>

<tbody id="runplan"></tbody>

</table>

</div>

<div class="row">

<label>Preferenze clima</label>

<select id="pref">

<option value="balanced">Bilanciato</option>
<option value="cool">Preferisco fresco</option>
<option value="warm">Preferisco caldo</option>
<option value="no_rain">Evita pioggia</option>
<option value="low_wind">Evita vento</option>

</select>

</div>

<div id="status"></div>

<div class="tabs">

<button class="tabbtn active" id="tabToday">
Oggi
</button>

<button class="tabbtn" id="tab7d">
7 giorni
</button>

</div>

</div>


<div class="card">

<div class="card-title">
Migliori finestre per allenamento
</div>

<div id="best"></div>

</div>


<div class="card">

<div class="card-title">
Dettaglio orario
</div>

<table>

<thead>

<tr>

<th>Ora</th>
<th>Score</th>
<th>Temperatura</th>
<th>Pioggia</th>
<th>Vento</th>

</tr>

</thead>

<tbody id="rows"></tbody>

</table>

</div>

</section>


<nav class="bottom-nav">

<button class="nav-item active" data-target="dashboard" onclick="showSection('dashboard')">
🏠
</button>

<button class="nav-item" data-target="map" onclick="showSection('map')">
🗺
</button>

<button class="nav-item" data-target="history" onclick="showSection('history')">
📒
</button>

<button class="nav-item" data-target="planner" onclick="showSection('planner')">
📅
</button>

<button class="nav-item" data-target="weatherpro" onclick="showSection('weatherpro')">
🌤
</button>

</nav>


<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="app.js"></script>

</body>
</html>
